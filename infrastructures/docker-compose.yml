version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: blockchain_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./backups/postgres:/backups
    networks:
      - blockchain_monitor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  es-master:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
    container_name: blockchain_es_master
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - node.name=es-master
      - node.roles=master
      - cluster.name=${ES_CLUSTER_NAME}
      - discovery.seed_hosts=es-data-1,es-data-2
      - cluster.initial_master_nodes=es-master
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=${ES_MASTER_JAVA_OPTS}"
      - xpack.security.enabled=${XPACK_SECURITY_ENABLED}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_master_data:/usr/share/elasticsearch/data
      - ./configs/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./logs/elasticsearch:/usr/share/elasticsearch/logs
    networks:
      - blockchain_monitor
    deploy:
      resources:
        limits:
          cpus: '${ES_MASTER_CPU_LIMIT}'
          memory: ${ES_MASTER_MEMORY_LIMIT}
        reservations:
          cpus: '${ES_MASTER_CPU_RESERVATION}'
          memory: ${ES_MASTER_MEMORY_RESERVATION}

  es-data-1:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
    container_name: blockchain_es_data1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - node.name=es-data-1
      - node.roles=data,ingest
      - cluster.name=${ES_CLUSTER_NAME}
      - discovery.seed_hosts=es-master,es-data-2
      - cluster.initial_master_nodes=es-master
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=${ES_DATA_JAVA_OPTS}"
      - xpack.security.enabled=${XPACK_SECURITY_ENABLED}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data1:/usr/share/elasticsearch/data
      - ./configs/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./logs/elasticsearch:/usr/share/elasticsearch/logs
    networks:
      - blockchain_monitor
    depends_on:
      - es-master
    deploy:
      resources:
        limits:
          cpus: '${ES_DATA_CPU_LIMIT}'
          memory: ${ES_DATA_MEMORY_LIMIT}
        reservations:
          cpus: '${ES_DATA_CPU_RESERVATION}'
          memory: ${ES_DATA_MEMORY_RESERVATION}

  es-data-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
    container_name: blockchain_es_data2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - node.name=es-data-2
      - node.roles=data,ingest
      - cluster.name=${ES_CLUSTER_NAME}
      - discovery.seed_hosts=es-master,es-data-1
      - cluster.initial_master_nodes=es-master
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=${ES_DATA_JAVA_OPTS}"
      - xpack.security.enabled=${XPACK_SECURITY_ENABLED}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data2:/usr/share/elasticsearch/data
      - ./configs/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./logs/elasticsearch:/usr/share/elasticsearch/logs
    networks:
      - blockchain_monitor
    depends_on:
      - es-master
    deploy:
      resources:
        limits:
          cpus: '${ES_DATA_CPU_LIMIT}'
          memory: ${ES_DATA_MEMORY_LIMIT}
        reservations:
          cpus: '${ES_DATA_CPU_RESERVATION}'
          memory: ${ES_DATA_MEMORY_RESERVATION}

  es-lb:
    image: nginx:alpine
    container_name: blockchain_es_lb
    restart: unless-stopped
    ports:
      - "${ES_PORT}:9200"
    volumes:
      - ./configs/nginx/es-lb.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - blockchain_monitor
    depends_on:
      - es-master
      - es-data-1
      - es-data-2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  kibana:
    image: docker.elastic.co/kibana/kibana:${ES_VERSION}
    container_name: blockchain_kibana
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_URL}
      - ELASTICSEARCH_USERNAME=${KIBANA_USERNAME}
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=${KIBANA_PORT}
      - xpack.security.enabled=${KIBANA_XPACK_SECURITY_ENABLED}
    ports:
      - "${KIBANA_PORT}:5601"
    volumes:
      - ./configs/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - kibana_data:/usr/share/kibana/data
      - ./logs/kibana:/usr/share/kibana/logs
    networks:
      - blockchain_monitor
    depends_on:
      - es-lb
    deploy:
      resources:
        limits:
          cpus: '${KIBANA_CPU_LIMIT}'
          memory: ${KIBANA_MEMORY_LIMIT}
        reservations:
          cpus: '${KIBANA_CPU_RESERVATION}'
          memory: ${KIBANA_MEMORY_RESERVATION}

  redis:
    image: redis:7-alpine
    container_name: blockchain_redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server /etc/redis/redis.conf
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
      - ./configs/redis/redis.conf:/etc/redis/redis.conf:ro
      - ./logs/redis:/var/log/redis
    networks:
      - blockchain_monitor
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT}
        reservations:
          memory: ${REDIS_MEMORY_RESERVATION}

  nginx:
    image: nginx:alpine
    container_name: blockchain_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - blockchain_monitor
    depends_on:
      - es-lb
      - kibana

  prometheus:
    image: prom/prometheus:latest
    container_name: blockchain_prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - blockchain_monitor
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  filebeat:
    image: docker.elastic.co/beats/filebeat:${ES_VERSION}
    container_name: blockchain_filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./configs/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/app:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - blockchain_monitor
    depends_on:
      - es-lb
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  blockchain_monitor:
    driver: bridge
    name: blockchain_monitor_network

volumes:
  postgres_data:
    name: blockchain_postgres_data
  elasticsearch_master_data:
    name: blockchain_es_master_data
  elasticsearch_data1:
    name: blockchain_es_data1
  elasticsearch_data2:
    name: blockchain_es_data2
  kibana_data:
    name: blockchain_kibana_data
  redis_data:
    name: blockchain_redis_data
  prometheus_data:
    name: blockchain_prometheus_data
